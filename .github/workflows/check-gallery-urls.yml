name: "Check gallery image URLs"

on:
  pull_request:
    paths:
      - 'src/data/**'
      - 'src/components/**'
      - 'src/pages/**'
      - 'public/wp-content/**'
  push:
    branches:
      - main
    paths:
      - 'src/data/**'
      - 'public/wp-content/**'

jobs:
  check-gallery-urls:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check local static files exist for /wp-content/uploads/ URLs
        run: |
          set -e
          FAIL=0

          # Extrage căile relative din gallery.ts (după /wp-content/uploads/)
          grep -oE "/wp-content/uploads/[^'\",\` \)>]+" src/data/gallery.ts \
            | sort -u > /tmp/gallery_paths.txt || true

          TOTAL=$(wc -l < /tmp/gallery_paths.txt | tr -d ' ')
          echo "Verificând $TOTAL căi de imagini din public/..."

          # Fișiere lipsă
          > /tmp/gallery_missing.txt
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            local_file="public${p}"
            if [ ! -f "$local_file" ]; then
              echo "$local_file" >> /tmp/gallery_missing.txt
              FAIL=1
            fi
          done < /tmp/gallery_paths.txt

          if [ "$FAIL" -ne 0 ]; then
            MISSING_COUNT=$(wc -l < /tmp/gallery_missing.txt | tr -d ' ')
            echo "::error::$MISSING_COUNT fișiere lipsesc din public/. Primele 10:"
            head -n 10 /tmp/gallery_missing.txt | while read -r f; do
              echo "::error::  MISSING: $f"
            done
            echo ""
            echo "Regulă: dacă adaugi un URL în gallery.ts, adaugă și fișierul în public/ în același PR."
            exit 1
          fi
          echo "✅ Toate $TOTAL căi există în public/"

      - name: Spot-check 5 URL-uri live (non-blocant)
        continue-on-error: true
        run: |
          # Extrage 5 URL-uri random și face HEAD check non-blocant
          grep -oE "https://www\.superparty\.ro/wp-content/uploads/[^'\",\` \)>]+" src/data/gallery.ts \
            | sort -u | shuf -n 5 > /tmp/spot_urls.txt 2>/dev/null || \
          grep -oE "https://www\.superparty\.ro/wp-content/uploads/[^'\",\` \)>]+" src/data/gallery.ts \
            | sort -u | sort -R | head -5 > /tmp/spot_urls.txt || true

          if [ ! -s /tmp/spot_urls.txt ]; then
            echo "Niciun URL live de verificat."
            exit 0
          fi

          echo "Spot-check live (5 URL-uri random):"
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -L "$url" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "  ✅ $status ${url##*/}"
            else
              echo "  ::warning::$status ${url##*/} — Vercel poate nu a terminat deploy-ul"
            fi
          done < /tmp/spot_urls.txt
