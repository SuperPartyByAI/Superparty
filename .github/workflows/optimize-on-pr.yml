name: "Optimize new images on PR"

on:
  pull_request:
    paths:
      - 'public/wp-content/uploads/**'

jobs:
  optimize-new-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: write   # pentru comment PR
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesar pentru diff cu base

      - name: Detect new image files vs base branch
        id: detect
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          # Imaginile adăugate/modificate în PR (fișiere noi față de base)
          git diff --name-only --diff-filter=A "$BASE" HEAD \
            | grep -E '^public/wp-content/uploads/.*\.(jpe?g|png|webp)$' \
            > /tmp/new_images.txt || true
          COUNT=$(wc -l < /tmp/new_images.txt | tr -d ' ')
          echo "new_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT new images:"
          cat /tmp/new_images.txt

      - name: Setup Node 18
        if: steps.detect.outputs.new_count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install sharp
        if: steps.detect.outputs.new_count != '0'
        run: npm install sharp --no-save

      - name: Optimize only new images
        if: steps.detect.outputs.new_count != '0'
        run: |
          set -e
          mkdir -p public/optimized/thumb public/optimized/hero
          OPTIMIZED_LIST=""
          while IFS= read -r imgpath; do
            [ -z "$imgpath" ] && continue
            # Cale relativă față de public/wp-content/uploads/
            rel="${imgpath#public/wp-content/uploads/}"
            baseName="${rel%.*}"

            # Thumb 400px
            outThumb="public/optimized/thumb/${baseName}.webp"
            mkdir -p "$(dirname "$outThumb")"
            node -e "
              const sharp = require('sharp');
              sharp('${imgpath}')
                .resize({ width: 400, withoutEnlargement: true })
                .webp({ quality: 80 })
                .toFile('${outThumb}')
                .then(() => process.exit(0))
                .catch(e => { console.error(e.message); process.exit(0); });
            " || true

            # Hero 1200px
            outHero="public/optimized/hero/${baseName}.webp"
            mkdir -p "$(dirname "$outHero")"
            node -e "
              const sharp = require('sharp');
              sharp('${imgpath}')
                .resize({ width: 1200, withoutEnlargement: true })
                .webp({ quality: 80 })
                .toFile('${outHero}')
                .then(() => process.exit(0))
                .catch(e => { console.error(e.message); process.exit(0); });
            " || true

            OPTIMIZED_LIST+="- \`${imgpath}\` → \`${outThumb}\`%0A"
          done < /tmp/new_images.txt

          echo "OPTIMIZED_LIST=${OPTIMIZED_LIST}" >> "$GITHUB_ENV"

      - name: Upload optimized images as artifact
        if: steps.detect.outputs.new_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: optimized-images-pr-${{ github.event.pull_request.number }}
          path: public/optimized/
          retention-days: 7

      - name: Comment PR with optimization results
        if: steps.detect.outputs.new_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const count = '${{ steps.detect.outputs.new_count }}';
            const body = [
              `## 🖼️ Imagini noi detectate: ${count}`,
              '',
              'Versiunile WebP optimizate (thumb 400px + hero 1200px) sunt disponibile ca **artifact** al acestui job.',
              '',
              '### ⚠️ Pasul manual necesar înainte de merge:',
              '1. Descarcă artifact `optimized-images-pr-${{ github.event.pull_request.number }}`',
              '2. Copiază conținutul în `public/optimized/` din repo',
              '3. Fă commit cu `git add public/optimized/ && git commit -m "feat(perf): WebP optimizate pentru imagini noi"`',
              '',
              "> **Alternativă**: rulează local `node scripts/optimize-images.mjs` și commit rezultatul.",
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: No new images found
        if: steps.detect.outputs.new_count == '0'
        run: echo "✅ Nicio imagine nouă detectată în public/wp-content/uploads/ — skip optimizare."
