name: "Optimize new images on PR (auto-commit thumbs)"

on:
  pull_request:
    paths:
      - 'public/wp-content/uploads/**'

jobs:
  optimize-new-images:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: write
      contents: write   # necesar pentru auto-commit
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect new image files vs base branch
        id: detect
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          git diff --name-only --diff-filter=A "$BASE" HEAD \
            | grep -E '^public/wp-content/uploads/.*\.(jpe?g|png|webp)$' \
            > /tmp/new_images.txt || true
          COUNT=$(wc -l < /tmp/new_images.txt | tr -d ' ')
          echo "new_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT new images:"
          cat /tmp/new_images.txt

      - name: Setup Node 18
        if: steps.detect.outputs.new_count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install sharp
        if: steps.detect.outputs.new_count != '0'
        run: npm install sharp --no-save

      - name: Optimize new images
        if: steps.detect.outputs.new_count != '0'
        id: optimize
        run: |
          set -e
          COMMITTED_THUMBS=""
          ARTIFACT_HEROS=""
          TOTAL_THUMB_SIZE=0

          while IFS= read -r imgpath; do
            [ -z "$imgpath" ] && continue
            rel="${imgpath#public/wp-content/uploads/}"
            baseName="${rel%.*}"

            # ── Thumb 400px → auto-commit dacă <500KB ──────────────
            outThumb="public/optimized/thumb/${baseName}.webp"
            mkdir -p "$(dirname "$outThumb")"
            node -e "
              const sharp=require('sharp');
              sharp('${imgpath}')
                .resize({width:400,withoutEnlargement:true})
                .webp({quality:80})
                .toFile('${outThumb}')
                .then(()=>process.exit(0))
                .catch(e=>{console.error(e.message);process.exit(0)});
            " || true

            if [ -f "$outThumb" ]; then
              THUMB_KB=$(du -k "$outThumb" | cut -f1)
              TOTAL_THUMB_SIZE=$((TOTAL_THUMB_SIZE + THUMB_KB))
              if [ "$THUMB_KB" -le 500 ]; then
                # Thumb mic → auto-commit
                COMMITTED_THUMBS+="$outThumb "
              fi
            fi

            # ── Hero 1200px → artifact (poate fi mare) ─────────────
            outHero="public/optimized/hero/${baseName}.webp"
            mkdir -p "$(dirname "$outHero")"
            node -e "
              const sharp=require('sharp');
              sharp('${imgpath}')
                .resize({width:1200,withoutEnlargement:true})
                .webp({quality:80})
                .toFile('${outHero}')
                .then(()=>process.exit(0))
                .catch(e=>{console.error(e.message);process.exit(0)});
            " || true
            ARTIFACT_HEROS+="$outHero "
          done < /tmp/new_images.txt

          echo "committed_thumbs=${COMMITTED_THUMBS}" >> "$GITHUB_OUTPUT"
          echo "artifact_heros=${ARTIFACT_HEROS}" >> "$GITHUB_OUTPUT"
          echo "Thumbs for auto-commit: $COMMITTED_THUMBS"
          echo "Heroes for artifact: $ARTIFACT_HEROS"

      - name: Auto-commit thumbs (<500KB)
        if: steps.detect.outputs.new_count != '0' && steps.optimize.outputs.committed_thumbs != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Adaugă doar thumb-urile mici
          for f in ${{ steps.optimize.outputs.committed_thumbs }}; do
            [ -f "$f" ] && git add "$f"
          done

          if git diff --cached --quiet; then
            echo "Nimic de commituit (toate deja existente)."
          else
            git commit -m "chore(perf): WebP thumbs auto-generate din CI (optimize-on-pr) [skip ci]"
            git push origin ${{ github.event.pull_request.head.ref }}
            echo "✅ Thumburi commituite în PR branch."
          fi

      - name: Upload hero WebP as artifact
        if: steps.detect.outputs.new_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: hero-optimized-pr-${{ github.event.pull_request.number }}
          path: public/optimized/hero/
          retention-days: 7

      - name: Comment PR cu summary
        if: steps.detect.outputs.new_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const count = '${{ steps.detect.outputs.new_count }}';
            const body = [
              `## 🖼️ Imagini noi detectate: ${count}`,
              '',
              '### ✅ Auto-commituite în branch (thumbs <500KB):',
              '`public/optimized/thumb/**/*.webp` — gata de merge.',
              '',
              '### ⬇️ Hero WebP (1200px) — descarcă manual:',
              `Artifact: **hero-optimized-pr-${{ github.event.pull_request.number }}**`,
              '1. Descarcă artifact din sidebar Actions',
              '2. `git add public/optimized/hero/... && git commit -m "feat(perf): hero WebP"`',
              '',
              '> Dacă hero-urile sunt mici (<500KB), pot fi auto-commituite la următoarea configurare a workflow-ului.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: No new images
        if: steps.detect.outputs.new_count == '0'
        run: echo "✅ Nicio imagine nouă — skip."
